<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Rendez-vous — CRM Coiffeur</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand"><span class="navbar-logo">✂</span><span>CRM Coiffeur</span></div>
    <ul class="navbar-links">
        <li><a th:href="@{/}">🏠 Tableau de bord</a></li>
        <li><a th:href="@{/clients}">👥 Clients</a></li>
        <li><a th:href="@{/rendez-vous}" class="active">📅 Rendez-vous</a></li>
    </ul>
</nav>

<main class="main-content">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="page-header">
        <h1>📅 Rendez-vous</h1>
        <a th:href="@{/rendez-vous/nouveau}" class="btn btn-primary">+ Nouveau rendez-vous</a>
    </div>

    <!-- Filtre par date -->
    <form th:action="@{/rendez-vous}" method="get" class="search-form">
        <input type="date" name="date"
               th:value="${dateFiltre != null ? #temporals.format(dateFiltre, 'yyyy-MM-dd') : ''}"
               class="search-input"/>
        <button type="submit" class="btn btn-primary">🔍 Filtrer</button>
        <a th:if="${dateFiltre}" th:href="@{/rendez-vous}" class="btn btn-outline">✕ Tous</a>
    </form>

    <div class="card">
        <div class="card-body">
            <div th:if="${#lists.isEmpty(rendezVous)}" class="empty-state">
                <p>Aucun rendez-vous trouvé.</p>
                <a th:href="@{/rendez-vous/nouveau}" class="btn btn-primary">Planifier un rendez-vous</a>
            </div>

            <table th:if="${!#lists.isEmpty(rendezVous)}" class="table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Heure</th>
                        <th>Client</th>
                        <th>Prestation</th>
                        <th>Durée</th>
                        <th>Prix</th>
                        <th>Statut</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="rv : ${rendezVous}">
                        <td th:text="${#temporals.format(rv.date, 'dd/MM/yyyy')}">date</td>
                        <td th:text="${rv.heureFormatee}">heure</td>
                        <td>
                            <a th:href="@{/clients/{id}(id=${rv.clientId})}"
                               th:text="${rv.clientNomComplet}">Client</a>
                        </td>
                        <td th:text="${rv.prestation}">Coupe</td>
                        <td th:text="${rv.dureeMinutes != null ? rv.dureeMinutes + ' min' : '—'}">—</td>
                        <td th:text="${rv.prix != null ? rv.prix + ' €' : '—'}">—</td>
                        <td>
                            <!-- Changement rapide de statut -->
                            <form th:action="@{/rendez-vous/{id}/statut(id=${rv.id})}" method="post" class="inline-form">
                                <select name="statut" class="select-statut"
                                        th:classappend="${rv.statutBadgeClass}"
                                        onchange="this.form.submit()">
                                    <option th:each="s : ${ {'en attente','confirmé','terminé','annulé'} }"
                                            th:value="${s}"
                                            th:text="${s}"
                                            th:selected="${s == rv.statut}">statut</option>
                                </select>
                            </form>
                        </td>
                        <td class="actions-cell">
                            <a th:href="@{/rendez-vous/{id}/modifier(id=${rv.id})}" class="btn btn-warning btn-sm">Modifier</a>
                            <form th:action="@{/rendez-vous/{id}/supprimer(id=${rv.id})}" method="post"
                                  onsubmit="return confirm('Supprimer ce rendez-vous ?')">
                                <button type="submit" class="btn btn-danger btn-sm">Supprimer</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<footer class="footer"><p>© 2025 CRM Coiffeur</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
