<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${titre + ' — CRM Coiffeur'}">Rendez-vous</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand"><span class="navbar-logo">✂</span><span>CRM Coiffeur</span></div>
    <ul class="navbar-links">
        <li><a th:href="@{/}">🏠 Tableau de bord</a></li>
        <li><a th:href="@{/clients}">👥 Clients</a></li>
        <li><a th:href="@{/rendez-vous}" class="active">📅 Rendez-vous</a></li>
    </ul>
</nav>

<main class="main-content">
    <div class="page-header">
        <div class="breadcrumb">
            <a th:href="@{/rendez-vous}">Rendez-vous</a> / <span th:text="${titre}">Formulaire</span>
        </div>
    </div>

    <div class="card form-card">
        <div class="card-header"><h2 th:text="${titre}">Formulaire</h2></div>
        <div class="card-body">

            <form th:action="@{/rendez-vous/sauvegarder}" th:object="${rendezVous}" method="post">
                <input type="hidden" th:field="*{id}"/>

                <div class="form-row">
                    <div class="form-group">
                        <label for="clientId">Client *</label>
                        <select id="clientId" th:field="*{clientId}"
                                th:classappend="${#fields.hasErrors('clientId')} ? 'input-error'">
                            <option value="">— Sélectionner un client —</option>
                            <option th:each="client : ${clients}"
                                    th:value="${client.id}"
                                    th:text="${client.nomComplet}">Client</option>
                        </select>
                        <span th:if="${#fields.hasErrors('clientId')}" th:errors="*{clientId}" class="field-error"></span>
                    </div>
                    <div class="form-group">
                        <label for="prestation">Prestation *</label>
                        <select id="prestation" th:field="*{prestation}"
                                th:classappend="${#fields.hasErrors('prestation')} ? 'input-error'">
                            <option value="">— Sélectionner —</option>
                            <option th:each="p : ${prestations}"
                                    th:value="${p}"
                                    th:text="${p}">Prestation</option>
                        </select>
                        <span th:if="${#fields.hasErrors('prestation')}" th:errors="*{prestation}" class="field-error"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="date">Date *</label>
                        <input type="date" id="date" th:field="*{date}"
                               th:classappend="${#fields.hasErrors('date')} ? 'input-error'"/>
                        <span th:if="${#fields.hasErrors('date')}" th:errors="*{date}" class="field-error"></span>
                    </div>
                    <div class="form-group">
                        <label for="heure">Heure *</label>
                        <input type="time" id="heure" th:field="*{heure}"
                               th:classappend="${#fields.hasErrors('heure')} ? 'input-error'"/>
                        <span th:if="${#fields.hasErrors('heure')}" th:errors="*{heure}" class="field-error"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="dureeMinutes">Durée (minutes)</label>
                        <input type="number" id="dureeMinutes" th:field="*{dureeMinutes}"
                               min="15" max="300" step="15" placeholder="60"/>
                    </div>
                    <div class="form-group">
                        <label for="prix">Prix (€)</label>
                        <input type="number" id="prix" th:field="*{prix}"
                               min="0" step="0.50" placeholder="45.00"/>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="statut">Statut</label>
                        <select id="statut" th:field="*{statut}">
                            <option th:each="s : ${statuts}"
                                    th:value="${s}"
                                    th:text="${s}">statut</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="commentaire">Commentaire</label>
                    <textarea id="commentaire" th:field="*{commentaire}" rows="3"
                              placeholder="Remarques particulières…"></textarea>
                </div>

                <div class="form-actions">
                    <a th:href="@{/rendez-vous}" class="btn btn-outline">Annuler</a>
                    <button type="submit" class="btn btn-primary">💾 Enregistrer</button>
                </div>
            </form>
        </div>
    </div>
</main>

<footer class="footer"><p>© 2025 CRM Coiffeur</p></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
